apiVersion: apps/v1
kind: Deployment
metadata:
  name: cuisineensemble-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cuisineensemble-backend
  template:
    metadata:
      labels:
        app: cuisineensemble-backend
    spec:
      containers:
        - name: backend
          image: cuisineensemble-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: cuisineensemble-secrets
                  key: database-url
---
apiVersion: v1
kind: Service
metadata:
  name: cuisineensemble-backend
spec:
  selector:
    app: cuisineensemble-backend
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
