apiVersion: apps/v1
kind: Deployment
metadata:
  name: cuisineensemble-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cuisineensemble-frontend
  template:
    metadata:
      labels:
        app: cuisineensemble-frontend
    spec:
      containers:
        - name: frontend
          image: cuisineensemble-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5173
---
apiVersion: v1
kind: Service
metadata:
  name: cuisineensemble-frontend
spec:
  selector:
    app: cuisineensemble-frontend
  ports:
    - protocol: TCP
      port: 5173
      targetPort: 5173
