services:
  db:
    image: postgres:16-alpine
    container_name: cuisineensemble-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cuisineensemble}
      POSTGRES_USER: ${POSTGRES_USER:-cuisine_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cuisine_password}
    ports:
      - "${HOST_BIND:-127.0.0.1}:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-cuisine_user} -d ${POSTGRES_DB:-cuisineensemble}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: cuisineensemble-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      UVICORN_WORKERS: ${UVICORN_WORKERS:-2}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    ports:
      - "${HOST_BIND:-127.0.0.1}:8000:8000"
    command: >-
      sh -c '
        if [ "$$ENVIRONMENT" = "production" ]; then
          exec uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers "$${UVICORN_WORKERS:-2}";
        else
          exec uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload;
        fi
      '
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  frontend:
    build:
      context: ./frontend
    container_name: cuisineensemble-frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      VITE_API_BASE: ${VITE_API_BASE:-/api}
      PORT: 5173
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "${HOST_BIND:-127.0.0.1}:5173:5173"
    command: >-
      sh -c '
        if [ "$$ENVIRONMENT" = "production" ]; then
          npm run build && exec node server.mjs;
        else
          exec npm run dev -- --host 0.0.0.0 --port 5173;
        fi
      '
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:5173').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  nginx:
    image: nginx:1.27-alpine
    container_name: cuisineensemble-nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "${HTTP_BIND:-0.0.0.0}:80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: cuisineensemble-prometheus
    restart: unless-stopped
    ports:
      - "${HOST_BIND:-127.0.0.1}:9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      backend:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.2.0
    container_name: cuisineensemble-grafana
    restart: unless-stopped
    ports:
      - "${HOST_BIND:-127.0.0.1}:3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  postgres_data:
  grafana_data:
  frontend_node_modules:
